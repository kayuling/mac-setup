<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2B4A"/>
      <stop offset="100%" style="stop-color:#0F1B33"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0D2240"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60CFFF"/>
      <stop offset="100%" style="stop-color:#3B9EE8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" clip-path="url(#squircle)">
    <line x1="0" y1="128" x2="1024" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="1024" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="1024" y2="384" stroke="white" stroke-width="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="640" x2="1024" y2="640" stroke="white" stroke-width="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="white" stroke-width="1"/>
    <line x1="0" y1="896" x2="1024" y2="896" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="896" y1="0" x2="896" y2="1024" stroke="white" stroke-width="1"/>
  </g>

  <!-- MacBook body (lid) -->
  <g filter="url(#shadow)">
    <!-- Screen bezel -->
    <rect x="192" y="220" width="640" height="420" rx="28" ry="28" fill="#2A3F5F" stroke="#3D5A80" stroke-width="6"/>
    <!-- Screen -->
    <rect x="218" y="246" width="588" height="368" rx="10" ry="10" fill="url(#screenGrad)"/>

    <!-- Base -->
    <rect x="148" y="642" width="728" height="34" rx="10" ry="10" fill="#253450"/>
    <!-- Hinge line -->
    <rect x="148" y="638" width="728" height="8" rx="4" ry="4" fill="#1A2840"/>
    <!-- Bottom feet/lip -->
    <rect x="112" y="672" width="800" height="22" rx="11" ry="11" fill="#1E2E48"/>

    <!-- Notch -->
    <rect x="472" y="220" width="80" height="18" rx="0" ry="0" fill="#1C2B4A"/>
    <rect x="480" y="220" width="64" height="14" rx="7" ry="7" fill="#1C2B4A"/>

    <!-- Camera dot -->
    <circle cx="512" cy="234" r="5" fill="#14202E"/>
    <circle cx="512" cy="234" r="2.5" fill="#1E3050" opacity="0.6"/>
  </g>

  <!-- Download arrow (centered on screen) -->
  <g filter="url(#glow)">
    <!-- Arrow shaft -->
    <rect x="488" y="320" width="48" height="140" rx="24" ry="24" fill="url(#arrowGrad)"/>
    <!-- Arrow head -->
    <polygon points="512,530 432,450 592,450" fill="url(#arrowGrad)"/>
    <!-- Base line -->
    <rect x="432" y="538" width="160" height="20" rx="10" ry="10" fill="url(#arrowGrad)"/>
  </g>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" style="stop-color:#000000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.35"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#vignette)"/>
</svg>
