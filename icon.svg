<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="50%" style="stop-color:#16213E"/>
      <stop offset="100%" style="stop-color:#0F3460"/>
    </linearGradient>
    <linearGradient id="laptopBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF0"/>
      <stop offset="100%" style="stop-color:#C4C8D4"/>
    </linearGradient>
    <linearGradient id="laptopBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D0D4DE"/>
      <stop offset="100%" style="stop-color:#B8BCCA"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="100%" style="stop-color:#1B2838"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#3A7BD5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="50%" style="stop-color:#3A7BD5"/>
      <stop offset="100%" style="stop-color:#6C5CE7"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00D2FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <g clip-path="url(#squircle)">
    <circle cx="200" cy="300" r="250" fill="url(#orb1)"/>
    <circle cx="850" cy="700" r="300" fill="url(#orb2)"/>
  </g>

  <!-- Subtle dot grid -->
  <g opacity="0.06" clip-path="url(#squircle)">
    <circle cx="128" cy="128" r="2" fill="white"/>
    <circle cx="256" cy="128" r="2" fill="white"/>
    <circle cx="384" cy="128" r="2" fill="white"/>
    <circle cx="512" cy="128" r="2" fill="white"/>
    <circle cx="640" cy="128" r="2" fill="white"/>
    <circle cx="768" cy="128" r="2" fill="white"/>
    <circle cx="896" cy="128" r="2" fill="white"/>
    <circle cx="128" cy="256" r="2" fill="white"/>
    <circle cx="256" cy="256" r="2" fill="white"/>
    <circle cx="384" cy="256" r="2" fill="white"/>
    <circle cx="512" cy="256" r="2" fill="white"/>
    <circle cx="640" cy="256" r="2" fill="white"/>
    <circle cx="768" cy="256" r="2" fill="white"/>
    <circle cx="896" cy="256" r="2" fill="white"/>
    <circle cx="128" cy="384" r="2" fill="white"/>
    <circle cx="256" cy="384" r="2" fill="white"/>
    <circle cx="384" cy="384" r="2" fill="white"/>
    <circle cx="512" cy="384" r="2" fill="white"/>
    <circle cx="640" cy="384" r="2" fill="white"/>
    <circle cx="768" cy="384" r="2" fill="white"/>
    <circle cx="896" cy="384" r="2" fill="white"/>
    <circle cx="128" cy="512" r="2" fill="white"/>
    <circle cx="256" cy="512" r="2" fill="white"/>
    <circle cx="384" cy="512" r="2" fill="white"/>
    <circle cx="512" cy="512" r="2" fill="white"/>
    <circle cx="640" cy="512" r="2" fill="white"/>
    <circle cx="768" cy="512" r="2" fill="white"/>
    <circle cx="896" cy="512" r="2" fill="white"/>
    <circle cx="128" cy="640" r="2" fill="white"/>
    <circle cx="256" cy="640" r="2" fill="white"/>
    <circle cx="384" cy="640" r="2" fill="white"/>
    <circle cx="512" cy="640" r="2" fill="white"/>
    <circle cx="640" cy="640" r="2" fill="white"/>
    <circle cx="768" cy="640" r="2" fill="white"/>
    <circle cx="896" cy="640" r="2" fill="white"/>
    <circle cx="128" cy="768" r="2" fill="white"/>
    <circle cx="256" cy="768" r="2" fill="white"/>
    <circle cx="384" cy="768" r="2" fill="white"/>
    <circle cx="512" cy="768" r="2" fill="white"/>
    <circle cx="640" cy="768" r="2" fill="white"/>
    <circle cx="768" cy="768" r="2" fill="white"/>
    <circle cx="896" cy="768" r="2" fill="white"/>
    <circle cx="128" cy="896" r="2" fill="white"/>
    <circle cx="256" cy="896" r="2" fill="white"/>
    <circle cx="384" cy="896" r="2" fill="white"/>
    <circle cx="512" cy="896" r="2" fill="white"/>
    <circle cx="640" cy="896" r="2" fill="white"/>
    <circle cx="768" cy="896" r="2" fill="white"/>
    <circle cx="896" cy="896" r="2" fill="white"/>
  </g>

  <!-- Laptop -->
  <g filter="url(#shadow)">
    <!-- Screen lid -->
    <rect x="210" y="240" width="604" height="390" rx="20" ry="20" fill="url(#laptopBody)"/>
    <!-- Screen bezel highlight -->
    <rect x="212" y="242" width="600" height="2" rx="1" fill="white" opacity="0.5"/>
    <!-- Screen -->
    <rect x="236" y="264" width="552" height="340" rx="6" ry="6" fill="url(#screen)"/>

    <!-- Notch -->
    <path d="M 476 240 L 476 240 Q 476 254 490 254 L 534 254 Q 548 254 548 240 Z" fill="url(#laptopBody)"/>
    <!-- Camera dot -->
    <circle cx="512" cy="248" r="4" fill="#3A4050"/>
    <circle cx="512" cy="248" r="1.8" fill="#1A2030" opacity="0.6"/>

    <!-- Hinge -->
    <rect x="196" y="630" width="632" height="8" rx="4" ry="4" fill="#A8ADBA"/>
    <!-- Base -->
    <rect x="170" y="636" width="684" height="30" rx="6" ry="6" fill="url(#laptopBase)"/>
    <!-- Base bottom edge -->
    <rect x="130" y="662" width="764" height="20" rx="10" ry="10" fill="#B0B5C4"/>
    <!-- Base highlight -->
    <rect x="130" y="662" width="764" height="2" rx="1" fill="white" opacity="0.3"/>
    <!-- Trackpad -->
    <rect x="430" y="646" width="164" height="6" rx="3" ry="3" fill="#BCC0CE" opacity="0.6"/>
  </g>

  <!-- Screen content: app grid dots -->
  <g opacity="0.4">
    <!-- Row 1 -->
    <rect x="280" y="310" width="36" height="36" rx="8" fill="#3A7BD5" opacity="0.6"/>
    <rect x="332" y="310" width="36" height="36" rx="8" fill="#6C5CE7" opacity="0.6"/>
    <rect x="384" y="310" width="36" height="36" rx="8" fill="#00D2FF" opacity="0.6"/>
    <rect x="436" y="310" width="36" height="36" rx="8" fill="#00E676" opacity="0.5"/>
    <!-- Row 2 -->
    <rect x="280" y="362" width="36" height="36" rx="8" fill="#FF6B6B" opacity="0.5"/>
    <rect x="332" y="362" width="36" height="36" rx="8" fill="#FFA502" opacity="0.5"/>
    <rect x="384" y="362" width="36" height="36" rx="8" fill="#3A7BD5" opacity="0.5"/>
    <rect x="436" y="362" width="36" height="36" rx="8" fill="#6C5CE7" opacity="0.4"/>
    <!-- Row 3 (faded) -->
    <rect x="280" y="414" width="36" height="36" rx="8" fill="#00D2FF" opacity="0.3"/>
    <rect x="332" y="414" width="36" height="36" rx="8" fill="#FF6B6B" opacity="0.3"/>
    <rect x="384" y="414" width="36" height="36" rx="8" fill="#00E676" opacity="0.3"/>
    <rect x="436" y="414" width="36" height="36" rx="8" fill="#FFA502" opacity="0.25"/>
  </g>

  <!-- Download arrow on screen (right side) -->
  <g filter="url(#glow)" transform="translate(600, 340)">
    <!-- Arrow shaft -->
    <rect x="-14" y="0" width="28" height="80" rx="14" fill="url(#arrowGrad)"/>
    <!-- Arrow head -->
    <polygon points="0,118 -38,68 38,68" fill="url(#arrowGrad)"/>
    <!-- Base tray -->
    <path d="M -44,120 L -44,136 Q -44,144 -36,144 L 36,144 Q 44,144 44,136 L 44,120" fill="none" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Green check badge (bottom-right of laptop) -->
  <g filter="url(#softGlow)">
    <circle cx="720" cy="590" r="48" fill="#0D1B2A"/>
    <circle cx="720" cy="590" r="40" fill="url(#checkGrad)"/>
    <polyline points="700,590 714,606 742,574" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top-right accent sparkle -->
  <g opacity="0.5" filter="url(#glow)">
    <line x1="780" y1="180" x2="780" y2="220" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="760" y1="200" x2="800" y2="200" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g opacity="0.3" filter="url(#glow)">
    <line x1="840" y1="250" x2="840" y2="275" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="827" y1="262" x2="853" y2="262" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" style="stop-color:#000000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#vignette)"/>
</svg>
