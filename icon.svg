<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feFlood flood-color="white" flood-opacity="0.1" result="flood"/>
      <feComposite in="flood" in2="SourceAlpha" operator="inside"/>
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad)" filter="url(#innerGlow)"/>

  <!-- Simplified Mac Display Frame -->
  <g transform="translate(256, 300)" filter="url(#softShadow)">
    <rect x="0" y="0" width="512" height="320" rx="24" fill="none" stroke="white" stroke-width="24" opacity="0.8"/>
    <!-- Stand -->
    <path d="M 200 320 L 220 380 L 292 380 L 312 320" fill="white" opacity="0.6"/>
    <rect x="180" y="380" width="152" height="12" rx="6" fill="white" opacity="0.6"/>
    
    <!-- Stylized "S" or Gear Symbol in Screen -->
    <g transform="translate(256, 160)">
      <!-- Gear Outer Circle -->
      <circle cx="0" cy="0" r="80" fill="none" stroke="url(#accentGrad)" stroke-width="20"/>
      <!-- Gear Teeth -->
      <g stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round">
        <line x1="0" y1="-95" x2="0" y2="-115"/>
        <line x1="0" y1="95" x2="0" y2="115"/>
        <line x1="-95" y1="0" x2="-115" y2="0"/>
        <line x1="95" y1="0" x2="115" y2="0"/>
        <line x1="-67" y1="-67" x2="-81" y2="-81"/>
        <line x1="67" y1="67" x2="81" y2="81"/>
        <line x1="-67" y1="67" x2="-81" y2="81"/>
        <line x1="67" y1="-67" x2="81" y2="-81"/>
      </g>
      <!-- Center checkmark -->
      <polyline points="-30,0 -10,20 30,-20" fill="none" stroke="url(#checkGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 5)"/>
    </g>
  </g>

  <!-- Success Indicator Badge -->
  <g transform="translate(720, 680)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="70" fill="#0F172A"/>
    <circle cx="0" cy="0" r="60" fill="url(#checkGrad)"/>
    <polyline points="-30,0 -10,20 30,-20" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 5)"/>
  </g>

  <!-- Modern Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="70%" style="stop-color:#000000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#vignette)"/>
</svg>
